name: Daily Harvard Gazette Radio

on:
  workflow_dispatch:
    inputs:
      backfill:
        description: Rebuild missing episodes from the last ten days
        required: false
        type: boolean
        default: false
      repair_only:
        description: Repair existing public episode metadata without generating a new episode
        required: false
        type: boolean
        default: false
  schedule:
    # 20:30 and 23:30 in Asia/Shanghai. The second run catches delayed newsletters.
    - cron: "30 12 * * *"
    - cron: "30 15 * * *"

permissions:
  contents: read

concurrency:
  group: harvard-radio-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install --requirement requirements.txt

      - name: Generate today's episode
        env:
          MAIL163_USER: ${{ secrets.MAIL163_USER }}
          MAIL163_AUTH_CODE: ${{ secrets.MAIL163_AUTH_CODE }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_BASE_URL: https://apihub.agnes-ai.com/v1
          AGNES_MODEL: agnes-2.0-flash
          HARVARD_MAIL_QUERY: gazette@u.harvard.edu
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/supabase_storage.py download
          python scripts/migrate_episode_dates.py --rerender
          python scripts/repair_story_titles.py
          if [ "${{ inputs.repair_only || false }}" = "true" ]; then
            echo "Repair-only run: keeping the current latest episode."
          elif [ "${{ inputs.backfill || false }}" = "true" ]; then
            python scripts/backfill_history.py
          else
            python scripts/generate_daily.py
          fi
          python scripts/sanitize_site.py
          python scripts/prune_public_data.py
          python scripts/supabase_storage.py upload
