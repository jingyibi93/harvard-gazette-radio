name: Daily Harvard Gazette Radio

on:
  workflow_dispatch:
    inputs:
      backfill:
        description: Rebuild missing episodes from the last ten days
        required: false
        type: boolean
        default: false
      repair_only:
        description: Repair existing public episode metadata without generating a new episode
        required: false
        type: boolean
        default: false
  schedule:
    # 20:30 in Asia/Shanghai.
    - cron: "30 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: harvard-radio-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install --requirement requirements.txt

      - name: Generate today's episode
        env:
          MAIL163_USER: ${{ secrets.MAIL163_USER }}
          MAIL163_AUTH_CODE: ${{ secrets.MAIL163_AUTH_CODE }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_BASE_URL: https://apihub.agnes-ai.com/v1
          AGNES_MODEL: agnes-2.0-flash
          HARVARD_MAIL_QUERY: gazette@u.harvard.edu
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/supabase_storage.py download
          python scripts/repair_story_titles.py
          if [ "${{ inputs.repair_only || false }}" = "true" ]; then
            echo "Repair-only run: keeping the current latest episode."
          elif [ "${{ inputs.backfill || false }}" = "true" ]; then
            python scripts/backfill_history.py
          else
            python scripts/generate_daily.py
          fi
          python scripts/sanitize_site.py
          python scripts/prune_public_data.py
          python scripts/supabase_storage.py upload

      - name: Configure public data endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          printf 'window.HARVARD_RADIO_DATA_BASE = "%s/storage/v1/object/public/harvard-radio";\n' \
            "${SUPABASE_URL%/}" > site/runtime-config.js
          rm -rf site/audio site/images site/episodes

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
