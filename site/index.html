<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f2e9" />
    <meta name="description" content="每天收听最新一期哈佛公报中英文电台。" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./fonts/noto-serif-sc-700.css?v=19" />
    <link rel="stylesheet" href="./styles.css?v=26" />
    <title>哈佛公报电台</title>
  </head>
  <body class="splash-active">
    <div class="splash-screen" id="splash-screen" aria-label="哈佛公报电台正在载入">
      <img src="./icon-512.png" alt="" />
    </div>
    <main class="app-shell">
      <header class="masthead">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>哈佛公报电台</h1>
          <p>Harvard Gazette Radio</p>
        </div>
      </header>

      <section class="episode view view-today" aria-labelledby="episode-title">
        <time id="episode-date"></time>
        <h2 id="episode-title">正在载入今日节目…</h2>

        <div class="language-switch" role="group" aria-label="节目语言">
          <button class="active" data-language="zh" type="button">中文</button>
          <button data-language="en" type="button">English</button>
        </div>

        <div class="player">
          <div class="player-controls">
            <button class="skip" id="back-button" type="button" aria-label="后退十五秒">
              <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M16 12v9h9M17 21a14 14 0 1 1-3 9" /><text x="18" y="35">15</text></svg>
            </button>
            <button class="play" id="play-button" type="button" aria-label="播放">
              <svg class="play-icon" viewBox="0 0 40 40" aria-hidden="true"><path d="M14 9l18 11-18 11z" /></svg>
              <svg class="pause-icon" viewBox="0 0 40 40" aria-hidden="true"><path d="M12 9h6v22h-6zM23 9h6v22h-6z" /></svg>
            </button>
            <button class="skip" id="forward-button" type="button" aria-label="前进十五秒">
              <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M32 12v9h-9M31 21a14 14 0 1 0 3 9" /><text x="15" y="35">15</text></svg>
            </button>
          </div>
          <div class="timeline">
            <span id="elapsed">00:00</span>
            <input id="progress" type="range" min="0" max="100" value="0" aria-label="播放进度" />
            <span id="duration">00:00</span>
          </div>
        </div>

        <audio id="audio" preload="metadata"></audio>
      </section>

      <section class="transcript view view-today" aria-labelledby="transcript-title">
        <div class="transcript-heading">
          <h2 id="transcript-title">同步口播</h2>
          <button id="full-script-button" type="button">
            查看全文
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
          </button>
        </div>
        <div id="live-caption" class="live-caption" aria-live="polite">
          <button class="caption-current" type="button">节目开始后，这里将同步显示口播内容。</button>
          <button class="caption-next" type="button"></button>
        </div>
      </section>

      <section class="stories view view-today" aria-labelledby="stories-title">
        <h2 id="stories-title">今日故事</h2>
        <ol id="story-list"></ol>
      </section>

      <section class="archive view" id="archive-view" aria-labelledby="archive-title" hidden>
        <header class="page-heading">
          <p>Harvard Gazette Radio</p>
          <h2 id="archive-title">往期节目</h2>
          <span>过去十天的哈佛公报</span>
        </header>
        <ol id="archive-list"></ol>
      </section>

      <section class="settings view" id="settings-view" aria-labelledby="settings-title" hidden>
        <header class="page-heading">
          <p>Listening preferences</p>
          <h2 id="settings-title">设置</h2>
          <span>这些偏好只保存在当前设备</span>
        </header>
        <div class="settings-list">
          <label class="setting-row">
            <span><strong>默认语言</strong><small>打开节目时优先播放</small></span>
            <select id="setting-language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <label class="setting-row">
            <span><strong>播放速度</strong><small>不改变声音音调</small></span>
            <select id="setting-speed">
              <option value="0.8">0.8×</option>
              <option value="1">1.0×</option>
              <option value="1.2">1.2×</option>
            </select>
          </label>
          <label class="setting-row">
            <span><strong>字幕字号</strong><small>同步口播的文字大小</small></span>
            <select id="setting-caption-size">
              <option value="small">小</option>
              <option value="standard">标准</option>
              <option value="large">大</option>
            </select>
          </label>
          <label class="setting-row">
            <span><strong>自动播放下一期</strong><small>当前节目结束后继续往前听</small></span>
            <input id="setting-autoplay" type="checkbox" />
          </label>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="active" data-view-target="today" type="button" aria-current="page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4zM8 8h8M8 12h8M8 16h5" /></svg>
        今日
      </button>
      <button data-view-target="archive" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14v13H5zM8 4h8v3" /></svg>
        往期
      </button>
      <button data-view-target="settings" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" /><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6L7 7M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4" /></svg>
        设置
      </button>
    </nav>

    <dialog id="script-dialog">
      <div class="dialog-header">
        <div>
          <p>Harvard Gazette Radio</p>
          <h2 id="dialog-title">完整口播稿</h2>
        </div>
        <button id="close-script-button" type="button" aria-label="关闭全文">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <div id="full-script" class="full-script"></div>
    </dialog>

    <script src="./runtime-config.js"></script>
    <script src="./app.js?v=28" defer></script>
  </body>
</html>
